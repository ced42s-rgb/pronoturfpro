<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fond arrondi -->
  <rect width="512" height="512" rx="100" fill="#0d0d0d"/>
  <defs>
    <radialGradient id="bg512" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orange512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
    <linearGradient id="green512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c896"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
    <linearGradient id="mane512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa060"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg512)"/>

  <!-- Ligne de sol -->
  <line x1="56" y1="390" x2="456" y2="390" stroke="#1a1a2e" stroke-width="3"/>

  <!-- Ombre cheval -->
  <ellipse cx="256" cy="392" rx="110" ry="12" fill="#000" opacity="0.3"/>

  <!-- Corps principal -->
  <ellipse cx="256" cy="290" rx="105" ry="66" fill="url(#orange512)" opacity="0.97"/>

  <!-- Arrière-train légèrement plus haut -->
  <ellipse cx="320" cy="278" rx="65" ry="55" fill="url(#orange512)"/>

  <!-- Cou -->
  <path d="M196 252 Q174 200 180 154 Q188 116 210 112 Q228 110 230 132 Q232 158 220 188 Q210 212 200 236 Z"
        fill="url(#orange512)"/>

  <!-- Tête -->
  <ellipse cx="200" cy="122" rx="38" ry="28" transform="rotate(-25 200 122)" fill="url(#orange512)"/>

  <!-- Museau -->
  <path d="M166 136 Q154 140 152 150 Q158 158 170 154 Q178 148 174 140 Z" fill="#d45820"/>

  <!-- Narine -->
  <ellipse cx="160" cy="148" rx="5" ry="3" fill="#a03010" opacity="0.7"/>

  <!-- Oeil -->
  <circle cx="192" cy="112" r="8" fill="#1a0a00"/>
  <circle cx="194" cy="110" r="3" fill="#fff" opacity="0.9"/>
  <circle cx="195" cy="110" r="1.5" fill="#fff"/>

  <!-- Crinière -->
  <path d="M210 98 Q230 72 252 82 Q268 92 260 112 Q248 102 232 108 Q220 112 214 126 Q208 114 210 98 Z"
        fill="url(#mane512)"/>
  <path d="M222 84 Q238 62 258 70 Q272 78 266 96 Q254 86 240 92 Z" fill="#ffb070" opacity="0.7"/>

  <!-- Oreilles -->
  <path d="M206 96 Q214 78 224 84 Q220 96 210 98 Z" fill="url(#orange512)"/>
  <path d="M208 92 Q216 80 222 86 Q218 94 212 96 Z" fill="#ffd0b0" opacity="0.5"/>

  <!-- Jambe avant gauche (en mouvement) -->
  <path d="M200 340 Q196 370 190 390 Q196 396 204 390 Q210 370 212 340 Z" fill="url(#orange512)"/>
  <!-- Genou avant gauche -->
  <ellipse cx="201" cy="356" rx="10" ry="8" fill="#d45820"/>

  <!-- Jambe avant droite -->
  <path d="M228 338 Q226 368 222 390 Q228 396 236 390 Q240 368 242 338 Z" fill="#d45820"/>
  <ellipse cx="232" cy="354" rx="10" ry="8" fill="#c04010"/>

  <!-- Jambe arrière gauche -->
  <path d="M284 342 Q282 372 278 390 Q284 396 292 390 Q296 372 298 342 Z" fill="#d45820"/>
  <ellipse cx="288" cy="360" rx="10" ry="8" fill="#c04010"/>

  <!-- Jambe arrière droite (en extension) -->
  <path d="M316 336 Q322 360 328 384 Q336 390 342 384 Q340 360 332 336 Z" fill="url(#orange512)"/>
  <ellipse cx="328" cy="356" rx="10" ry="8" fill="#d45820"/>

  <!-- Sabots -->
  <rect x="184" y="387" width="22" height="10" rx="5" fill="#222"/>
  <rect x="216" y="387" width="22" height="10" rx="5" fill="#222"/>
  <rect x="272" y="387" width="22" height="10" rx="5" fill="#222"/>
  <rect x="328" y="381" width="22" height="10" rx="5" fill="#222"/>

  <!-- Queue longue et fluide -->
  <path d="M368 272 Q400 248 412 272 Q420 294 408 316 Q396 330 380 322 Q368 312 368 298 Q380 306 390 296 Q398 282 388 268 Q378 258 368 272 Z"
        fill="url(#mane512)"/>
  <path d="M372 280 Q396 262 404 280 Q408 296 396 310 Q388 314 380 308 Q390 300 392 286 Q390 272 376 270 Z"
        fill="#ffb070" opacity="0.5"/>

  <!-- Jockey (silhouette simple) -->
  <ellipse cx="244" cy="240" rx="18" ry="16" fill="#1a1a2e"/>
  <rect x="234" y="250" width="20" height="26" rx="4" fill="#1a1a2e"/>
  <!-- Casque jockey -->
  <path d="M228 236 Q244 218 262 234 Q260 242 244 244 Q228 244 228 236 Z" fill="url(#green512)"/>
  <rect x="226" y="238" width="36" height="5" rx="2" fill="#007a5a"/>
  <!-- Bras tenant les rênes -->
  <path d="M234 258 Q220 252 210 244 Q204 236 196 240" stroke="url(#green512)" stroke-width="3"
        fill="none" stroke-linecap="round"/>

  <!-- Nom application -->
  <text x="256" y="450" font-family="Arial Black, sans-serif" font-size="42" font-weight="900"
        fill="url(#orange512)" text-anchor="middle" letter-spacing="2">PRONOTURF</text>
  <text x="256" y="490" font-family="Arial Black, sans-serif" font-size="28" font-weight="900"
        fill="url(#green512)" text-anchor="middle" letter-spacing="6">PRO</text>
</svg>