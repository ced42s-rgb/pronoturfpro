<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PRONOTURF VIP · Connexion</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6b35">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0a0a0a,#1a1a2e);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.box{max-width:380px;width:100%;text-align:center;}
.logo{font-size:2.4em;font-weight:900;color:#ff6b35;margin-bottom:8px;letter-spacing:2px;}
.card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:32px 20px;margin-bottom:20px;}
.inputs{display:flex;gap:6px;justify-content:center;margin:20px 0;flex-wrap:wrap;}
.d{width:36px;height:50px;border-radius:10px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:#fff;font-size:1.4em;font-weight:800;text-align:center;outline:none;transition:border-color .2s;}
.d:focus{border-color:#ff6b35;}
.d.ok{border-color:#00ff88;}
.btn{width:100%;padding:14px;border-radius:40px;border:none;font-size:1.05em;font-weight:700;cursor:pointer;background:linear-gradient(45deg,#ff6b35,#e94560);color:#fff;margin-bottom:12px;transition:opacity .2s;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.msg{border-radius:12px;padding:12px;font-size:.88em;margin-bottom:12px;display:none;}
.err{background:rgba(231,76,60,.15);color:#ff6b6b;border:1px solid rgba(231,76,60,.4);}
.exp{background:rgba(255,165,0,.15);color:#FFA500;border:1px solid rgba(255,165,0,.4);}
</style>
</head>
<body>
<div class="box">
  <div class="logo">🏇 PRONOTURF VIP</div>
  <p style="color:#aaa;margin-bottom:28px;">Accès membres VIP exclusif</p>
  <div class="card">
    <div style="font-size:2.5em;margin-bottom:12px;">🔐</div>
    <div style="font-size:1.3em;font-weight:700;margin-bottom:6px;">Code accès VIP</div>
    <p style="color:#aaa;font-size:.85em;margin-bottom:20px;">Entrez votre code à 8 chiffres</p>
    <div class="inputs">
      <input class="d" id="d0" maxlength="1" type="tel" inputmode="numeric" autocomplete="off">
      <input class="d" id="d1" maxlength="1" type="tel" inputmode="numeric" autocomplete="off">
      <input class="d" id="d2" maxlength="1" type="tel" inputmode="numeric" autocomplete="off">
      <input class="d" id="d3" maxlength="1" type="tel" inputmode="numeric" autocomplete="off">
      <input class="d" id="d4" maxlength="1" type="tel" inputmode="numeric" autocomplete="off">
      <input class="d" id="d5" maxlength="1" type="tel" inputmode="numeric" autocomplete="off">
      <input class="d" id="d6" maxlength="1" type="tel" inputmode="numeric" autocomplete="off">
      <input class="d" id="d7" maxlength="1" type="tel" inputmode="numeric" autocomplete="off">
    </div>
    <div class="msg err" id="er">❌ Code incorrect. Vérifiez votre code VIP.</div>
    <div class="msg exp" id="ex">⏰ Accès expiré — Renouvelez votre abonnement.</div>
    <button class="btn" id="btn" onclick="go()" disabled>ACCÉDER AUX PRONOS →</button>
    <a href="index.html" style="color:#00B1FA;font-size:.85em;text-decoration:none;font-weight:600;">
      💎 S'abonner — 5,99€/mois
    </a>
  </div>
  <div style="color:#555;font-size:.8em;">🏇 PRONOTURF PRO · pronoturfpro.fr</div>
  <div style="margin-top:16px;">
    <a href="index.html" style="color:#555;font-size:12px;text-decoration:none;">← Retour à l'accueil</a>
  </div>
</div>

<script>
// ── Codes VIP hardcodés (fallback) — gérer depuis l'app Admin pour les abonnés dynamiques
const CODES_STATIC = {
  "15081972": { nom: "Admin",           exp: "2099-12-31" },
  "00000000": { nom: "Code secours",    exp: "2099-12-31" },
  "99615696": { nom: "Roger",           exp: "2026-05-15" },
  "14940301": { nom: "Cedric (test)",   exp: "2026-05-15" },
  "98190599": { nom: "Cedric Admin",    exp: "2099-12-31" },
  "40140000": { nom: "Hamza Amalfi",    exp: "2026-05-15" },
  "79610000": { nom: "Abdelatif",       exp: "2026-05-15" },
};

// ── Abonnés dynamiques (générés depuis l'app Admin)
function getDynAbonnes() {
  try { return JSON.parse(localStorage.getItem('pnturf_v11_abonnes')) || []; }
  catch { return []; }
}

// ── PIN maître depuis store
function getMasterPin() {
  try { const v=localStorage.getItem('pnturf_v11_master_pin'); return v?JSON.parse(v):'15081972'; }
  catch { return '15081972'; }
}

// ── Redirect si déjà connecté
(function(){
  if(localStorage.getItem('pnturf_vip')==='1')
    window.location.href='pronoturf_pro_v11.html';
})();

// ── Navigation entre les 8 cases
function gd(i){ return document.getElementById('d'+i); }
function getCode(){ let s=''; for(let i=0;i<8;i++) s+=gd(i).value; return s; }

for(let n=0;n<8;n++){
  (function(i){
    gd(i).oninput=function(){
      this.value=this.value.replace(/[^0-9]/g,'').slice(0,1);
      this.className='d'+(this.value?' ok':'');
      if(this.value&&i<7) gd(i+1).focus();
      document.getElementById('btn').disabled=getCode().length<8;
    };
    gd(i).onkeydown=function(e){
      if(e.key==='Backspace'&&!this.value&&i>0) gd(i-1).focus();
    };
  })(n);
}

function go(){
  const code=getCode();
  const errEl=document.getElementById('er');
  const expEl=document.getElementById('ex');
  errEl.style.display='none'; expEl.style.display='none';
  if(code.length!==8) return;

  // 1. PIN maître
  if(code===getMasterPin()){
    _connect(code,'Admin');
    return;
  }

  // 2. Codes statiques
  if(CODES_STATIC[code]){
    const d=CODES_STATIC[code];
    const exp=new Date(d.exp), now=new Date(); now.setHours(0,0,0,0);
    if(now>exp){ expEl.style.display='block'; return; }
    _connect(code, d.nom);
    return;
  }

  // 3. Abonnés dynamiques (app Admin)
  const dyn=getDynAbonnes().find(a=>a.pin===code&&a.actif!==false);
  if(dyn){ _connect(code, dyn.email||'Abonné'); return; }

  // 4. Échec
  errEl.style.display='block';
  for(let i=0;i<8;i++){gd(i).value='';gd(i).className='d';}
  gd(0).focus();
  document.getElementById('btn').disabled=true;
}

function _connect(code, nom){
  localStorage.setItem('pnturf_vip','1');
  sessionStorage.setItem('vip_code', code);
  sessionStorage.setItem('vip_nom',  nom);
  window.location.href='pronoturf_pro_v11.html';
}

gd(0).focus();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}
</script>
</body>
</html>
