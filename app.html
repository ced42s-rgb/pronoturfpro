<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pronoturf VIP - Connexion</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:linear-gradient(135deg,#0a0a0a,#1a1a2e,#16213e);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{max-width:380px;width:100%;text-align:center}
.logo{font-size:2.4em;font-weight:800;color:#FFD700;margin-bottom:6px}
.sub{color:#aaa;font-size:.9em;margin-bottom:30px}
.card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:32px 22px}
.ico{font-size:2.8em;margin-bottom:12px}
.ttl{font-size:1.3em;font-weight:700;margin-bottom:6px}
.hint{color:#aaa;font-size:.82em;margin-bottom:22px}
.inputs{display:flex;gap:7px;justify-content:center;margin-bottom:20px}
.d{width:40px;height:52px;border-radius:10px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:#fff;font-size:1.5em;font-weight:800;text-align:center;outline:none;transition:border-color .2s}
.d:focus{border-color:#FFD700;background:rgba(255,215,0,.08)}
.d.ok{border-color:#00ff88;background:rgba(0,255,136,.07)}
.btn{width:100%;padding:15px;border-radius:40px;border:none;font-size:1.05em;font-weight:700;cursor:pointer;background:linear-gradient(45deg,#FFD700,#FFA500);color:#000;margin-bottom:14px;transition:opacity .2s}
.btn:disabled{opacity:.3;cursor:not-allowed}
.msg{border-radius:12px;padding:12px;font-size:.87em;font-weight:600;display:none;margin-bottom:12px;text-align:left}
.err{background:rgba(231,76,60,.15);color:#ff6b6b;border:1px solid rgba(231,76,60,.35)}
.exp{background:rgba(255,165,0,.15);color:#FFA500;border:1px solid rgba(255,165,0,.35)}
.lnk{color:#00B1FA;font-size:.85em;text-decoration:none;font-weight:600}
.foot{margin-top:24px;color:#555;font-size:.78em}
</style>
</head>
<body>
<script>
  if(sessionStorage.getItem("vip")!=="1"){window.location.href="index.html";}
</script>
<div class="box">
  <div class="logo">🏇 PRONOTURF VIP</div>
  <p class="sub">Accès membres VIP exclusif</p>
  <div class="card">
    <div class="ico">🔐</div>
    <div class="ttl">Code accès VIP</div>
    <p class="hint">Entrez votre code à 8 chiffres</p>
    <div class="inputs">
      <input class="d" id="d0" maxlength="1" type="tel" inputmode="numeric">
      <input class="d" id="d1" maxlength="1" type="tel" inputmode="numeric">
      <input class="d" id="d2" maxlength="1" type="tel" inputmode="numeric">
      <input class="d" id="d3" maxlength="1" type="tel" inputmode="numeric">
      <input class="d" id="d4" maxlength="1" type="tel" inputmode="numeric">
      <input class="d" id="d5" maxlength="1" type="tel" inputmode="numeric">
      <input class="d" id="d6" maxlength="1" type="tel" inputmode="numeric">
      <input class="d" id="d7" maxlength="1" type="tel" inputmode="numeric">
    </div>
    <div class="msg err" id="er">❌ Code incorrect. Vérifiez votre code VIP.</div>
    <div class="msg exp" id="ex">⏰ Accès expiré. Renouvelez votre abonnement.</div>
    <button class="btn" id="btn" onclick="go()" disabled>ACCÉDER AUX PRONOS →</button>
    <a href="https://pronoturf-vip.netlify.app" class="lnk">💎 S'abonner — 5,99€/mois</a>
  </div>
  <div class="foot">📞 Support VIP : 09 74 75 13 13</div>
</div>
<script>
// ══════════════════════════════════════
//  CODES VIP  →  ajouter ici les abonnés
// ══════════════════════════════════════
var C = {
  "47291836": "2026-05-11",
  "93847162": "2026-05-11",
  "28374951": "2026-04-13",
  "12345678": "2026-06-30",
  "00000000": "2099-12-31"
};
// ══════════════════════════════════════
function gd(i){return document.getElementById("d"+i);}
function gc(){var s="";for(var i=0;i<8;i++)s+=gd(i).value;return s;}
for(var _=0;_<8;_++){(function(i){
  gd(i).oninput=function(){
    this.value=this.value.replace(/[^0-9]/g,"");
    this.className="d"+(this.value?" ok":"");
    if(this.value&&i<7)gd(i+1).focus();
    document.getElementById("btn").disabled=gc().length<8;
  };
  gd(i).onkeydown=function(e){
    if(e.key==="Backspace"&&!this.value&&i>0)gd(i-1).focus();
  };
  gd(i).addEventListener("paste",function(e){
    e.preventDefault();
    var p=(e.clipboardData||window.clipboardData).getData("text").replace(/[^0-9]/g,"");
    if(p.length===8){for(var j=0;j<8;j++){gd(j).value=p[j]||"";gd(j).className="d"+(p[j]?" ok":"");}document.getElementById("btn").disabled=false;gd(7).focus();}
  });
}(_));}
function go(){
  var code=gc();
  document.getElementById("er").style.display="none";
  document.getElementById("ex").style.display="none";
  if(!C[code]){
    document.getElementById("er").style.display="block";
    for(var i=0;i<8;i++){gd(i).value="";gd(i).className="d";}
    gd(0).focus();return;
  }
  var exp=new Date(C[code]),now=new Date();
  now.setHours(0,0,0,0);
  if(now>exp){document.getElementById("ex").style.display="block";return;}
  sessionStorage.setItem("vip","1");
  sessionStorage.setItem("vip_days",Math.ceil((exp-now)/86400000));
  sessionStorage.setItem("vip_code",code);
  window.location.href="app.html";
}
if(sessionStorage.getItem("vip")==="1")window.location.href="app.html";
gd(0).focus();
</script>
</body>
</html>
