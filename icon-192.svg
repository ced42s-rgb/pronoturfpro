<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Fond -->
  <rect width="192" height="192" rx="40" fill="#0d0d0d"/>
  <!-- Cercle gradient orange -->
  <defs>
    <radialGradient id="bg192" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orange192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
    <linearGradient id="green192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c896"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg192)"/>

  <!-- Cheval stylisé (silhouette) -->
  <!-- Corps -->
  <ellipse cx="96" cy="108" rx="38" ry="24" fill="url(#orange192)" opacity="0.95"/>
  <!-- Cou -->
  <path d="M80 92 Q72 72 78 58 Q84 46 94 48 Q100 50 98 62 Q96 72 88 82 Z" fill="url(#orange192)"/>
  <!-- Tête -->
  <ellipse cx="90" cy="50" rx="14" ry="10" transform="rotate(-20 90 50)" fill="url(#orange192)"/>
  <!-- Museau -->
  <ellipse cx="78" cy="54" rx="7" ry="5" transform="rotate(-20 78 54)" fill="#e05020"/>
  <!-- Oeil -->
  <circle cx="86" cy="46" r="3" fill="#0d0d0d"/>
  <circle cx="87" cy="45" r="1" fill="#fff"/>
  <!-- Crinière -->
  <path d="M90 42 Q96 36 102 40 Q106 44 102 50 Q98 46 94 48 Z" fill="#ffa060"/>
  <!-- Jambes avant -->
  <rect x="72" y="126" width="8" height="32" rx="4" fill="url(#orange192)"/>
  <rect x="84" y="126" width="8" height="36" rx="4" fill="#e05020"/>
  <!-- Jambes arrière -->
  <rect x="106" y="126" width="8" height="32" rx="4" fill="#e05020"/>
  <rect x="118" y="126" width="8" height="28" rx="4" fill="url(#orange192)"/>
  <!-- Sabots -->
  <rect x="71" y="155" width="10" height="5" rx="2" fill="#333"/>
  <rect x="83" y="159" width="10" height="5" rx="2" fill="#333"/>
  <rect x="105" y="155" width="10" height="5" rx="2" fill="#333"/>
  <rect x="117" y="151" width="10" height="5" rx="2" fill="#333"/>
  <!-- Queue -->
  <path d="M134 110 Q148 100 152 114 Q148 122 140 118 Q136 115 134 110 Z" fill="#ffa060"/>

  <!-- Texte PT -->
  <text x="96" y="180" font-family="Arial Black, sans-serif" font-size="14" font-weight="900"
        fill="url(#green192)" text-anchor="middle" letter-spacing="3">PT PRO</text>
</svg>