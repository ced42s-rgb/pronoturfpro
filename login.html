<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pronoturf VIP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:linear-gradient(135deg,#0a0a0a,#1a1a2e);
color:#fff;min-height:100vh;display:flex;align-items:center;
justify-content:center;padding:20px}
.box{max-width:380px;width:100%;text-align:center}
.logo{font-size:2.4em;font-weight:800;color:#FFD700;margin-bottom:8px}
.card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
border-radius:24px;padding:32px 20px;margin-bottom:20px}
.inputs{display:flex;gap:6px;justify-content:center;margin:20px 0}
.d{width:40px;height:52px;border-radius:10px;
border:2px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.07);color:#fff;font-size:1.5em;
font-weight:800;text-align:center;outline:none}
.d:focus{border-color:#FFD700}
.d.ok{border-color:#00ff88}
.btn{width:100%;padding:14px;border-radius:40px;border:none;
font-size:1.05em;font-weight:700;cursor:pointer;
background:linear-gradient(45deg,#FFD700,#FFA500);
color:#000;margin-bottom:12px}
.btn:disabled{opacity:.3;cursor:not-allowed}
.err{background:rgba(231,76,60,.15);color:#ff6b6b;
border:1px solid rgba(231,76,60,.4);border-radius:12px;
padding:12px;font-size:.88em;display:none;margin-bottom:12px}
.exp{background:rgba(255,165,0,.15);color:#FFA500;
border:1px solid rgba(255,165,0,.4);border-radius:12px;
padding:12px;font-size:.88em;display:none;margin-bottom:12px}
</style>
</head>
<body>
<div class="box">
<div class="logo">🏇 PRONOTURF VIP</div>
<p style="color:#aaa;margin-bottom:28px">Accès membres VIP exclusif</p>
<div class="card">
<div style="font-size:2.5em;margin-bottom:12px">🔐</div>
<div style="font-size:1.3em;font-weight:700;margin-bottom:6px">
  Code accès VIP
</div>
<p style="color:#aaa;font-size:.85em;margin-bottom:20px">
  Entrez votre code à 8 chiffres
</p>
<div class="inputs">
<input class="d" id="d0" maxlength="1" type="tel" inputmode="numeric">
<input class="d" id="d1" maxlength="1" type="tel" inputmode="numeric">
<input class="d" id="d2" maxlength="1" type="tel" inputmode="numeric">
<input class="d" id="d3" maxlength="1" type="tel" inputmode="numeric">
<input class="d" id="d4" maxlength="1" type="tel" inputmode="numeric">
<input class="d" id="d5" maxlength="1" type="tel" inputmode="numeric">
<input class="d" id="d6" maxlength="1" type="tel" inputmode="numeric">
<input class="d" id="d7" maxlength="1" type="tel" inputmode="numeric">
</div>
<div class="err" id="er">❌ Code incorrect. Vérifiez votre code VIP.</div>
<div class="exp" id="ex">⏰ Accès expiré — Renouvelez votre abonnement.</div>
<button class="btn" id="btn" onclick="go()" disabled>
  ACCÉDER AUX PRONOS →
</button>
<a href="https://pronoturf-vip.netlify.app"
style="color:#00B1FA;font-size:.85em;text-decoration:none;font-weight:600">
  💎 S'abonner — 5,99€/mois
</a>
</div>
<div style="color:#555;font-size:.8em">📞 09 74 75 13 13</div>
</div>
<script>
var C={
  "47291836":"2026-05-11",
  "93847162":"2026-05-11",
  "28374951":"2026-04-13",
  "12345678":"2026-06-30",
  "00000000":"2099-12-31"
};
function gd(i){return document.getElementById("d"+i);}
function gc(){var s="";for(var i=0;i<8;i++)s+=gd(i).value;return s;}
for(var _=0;_<8;_++){(function(i){
  gd(i).oninput=function(){
    this.value=this.value.replace(/[^0-9]/g,"");
    this.className="d"+(this.value?" ok":"");
    if(this.value&&i<7)gd(i+1).focus();
    document.getElementById("btn").disabled=gc().length<8;
  };
  gd(i).onkeydown=function(e){
    if(e.key==="Backspace"&&!this.value&&i>0)gd(i-1).focus();
  };
}(_));}
function go(){
  var code=gc();
  document.getElementById("er").style.display="none";
  document.getElementById("ex").style.display="none";
  if(!C[code]){
    document.getElementById("er").style.display="block";
    for(var i=0;i<8;i++){gd(i).value="";gd(i).className="d";}
    gd(0).focus();return;
  }
  var exp=new Date(C[code]),now=new Date();
  now.setHours(0,0,0,0);
  if(now>exp){
    document.getElementById("ex").style.display="block";return;
  }
  sessionStorage.setItem("vip","1");
  sessionStorage.setItem("days",Math.ceil((exp-now)/86400000));
  window.location.href="app.html";
}
if(sessionStorage.getItem("vip")==="1")window.location.href="app.html";
gd(0).focus();
</script>
</body>
</html>
